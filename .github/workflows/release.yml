name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Download OCR data (English)
        shell: pwsh
        run: pwsh -File tools/get-tessdata.ps1

      - name: Publish self-contained win-x64 build
        run: >
          dotnet publish src/Graphite.App/Graphite.App.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Zip the published output
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          Compress-Archive -Path publish\* -DestinationPath "Graphite-$version-win-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Graphite-*-win-x64.zip
          generate_release_notes: true
